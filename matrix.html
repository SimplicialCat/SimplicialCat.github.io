<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩阵生成器</title>
    <!-- KaTeX 核心 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" integrity="sha384-zh0CIslj+VczCZtlzBcjt5ppRcsAmDnRem7ESsYwWwg3m/OaJ2l4x7YBZl9Kxxib" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" integrity="sha384-Rma6DA2IPUwhNxmrB/7S3Tno0YY7sFu9WSYMCuulLhIqYSGZ2gKCJWIqhBWqMQfh" crossorigin="anonymous"></script>

    <style>
        /* 颜色变量 —— 完整保留Furina色系 */
        :root {
            --color-Furina-deep-navy: #253085;
            --color-Furina-royal-blue: #465BCF;
            --color-Furina-aqua-cyan: #6AC6E8;
            --color-Furina-frost-white: #FAFBFC;
            --color-Furina-misty-blue: #C4D7ED;
            --color-Furina-vivid-sapphire: #5670E9;
            --color-Furina-luminous-hydro: #70DBFF;
            --color-Furina-bright-periwinkle: #8DA4F1;
            --color-Furina-vintage-gold: #BD9368;
            --color-Furina-vintage-gold-light: #DDB368;
            --color-Furina-vintage-gold-ultra-light : #FDF388;
            --bg-page: var(--color-Furina-frost-white);
            --bg-radial: radial-gradient(circle at 87% 13%, rgba(70, 91, 207, 0.03) 0%, transparent 70%);
            --text-dark: #253085;
            --text-light: #6AC6E8;
            --border-light: #6AC6E8;
            --border-focus: #253085;
            --node-bg: #EFEFFF;
            --edge-bg: #FFFFFF;
            --selected-bg: #F4F5FF;
            --selected-border: #FFFFFF;
            --button-bg: transparent;
            --button-hover: rgba(0,0,0,0.02);
            --input-bg: #FFFFFF;
            --gap-color: transparent;
            --preview-bg: #EFEFFF;
            --pre-header-text: #333;
            --pre-code-bg: #ffffff;
            --pre-code-text: #111;
            --pre-code-border: #ddd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-radial), var(--bg-page);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 3rem 1rem;
        }
        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .title {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .title h1 {
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: -0.5px;
            color: var(--text-dark);
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 0.8rem;
            width: 100%;
        }

        .input-field {
            flex: 1 1 200px;
            padding: 0.7rem 0.5rem;
            font-size: 1rem;
            border: none;
            border-bottom: 1px solid var(--border-light);
            background: transparent;
            outline: none;
            color: var(--text-dark);
        }
        .input-field:focus {
            border-bottom-color: var(--border-focus);
        }
        .input-field::placeholder {
            color: var(--border-light);
            font-weight: 300;
        }

        .btn {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            border: none;
            background: transparent;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.1s;
            border-radius: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }
        .btn:hover {
            background: var(--button-hover);
        }

        .apply-btn {
            border-bottom: 1px solid var(--border-light);
            padding: 0.5rem 1rem;
        }

        .grid-container {
            overflow-x: auto;
            margin: 1rem 0 0.5rem 0;
            background: transparent;
            padding: 1rem 0.5rem;
            display: flex;
            justify-content: center;
        }

        .swap-table {
            border-collapse: separate;
            border-spacing: 2px;
        }

        .swap-table td {
            border: none;
            min-width: 3.2rem;
            height: 3.2rem;
            text-align: center;
            vertical-align: middle;
            font-size: 1.1rem;
            padding: 0 4px;
            transition: background 0.1s;
        }

        .swap-table td.matrix-cell {
            background-color: var(--node-bg);
            font-weight: 500;
            cursor: pointer;
        }

        .cell-editor {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--input-bg);
            font-family: inherit;
            font-size: 1.0rem;
            text-align: center;
            padding: 0;
            margin: 0;
            outline: 1px solid var(--selected-border);
            color: var(--text-dark);
        }

        .edge-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px 24px;
            padding: 12px 0;
            margin: 8px 0 16px 0;
        }

        #matrixEnvSelect {
            background: transparent;
            color: var(--text-dark);
            border: none;
            border-bottom: 1px solid var(--border-light);
            border-radius: 0;
            padding: 0.3rem 1.8rem 0.3rem 0.3rem;
            font-size: 1rem;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236AC6E8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 0.2rem center;
            background-size: 1.2rem;
        }
        #matrixEnvSelect:focus {
            border-bottom-color: var(--border-focus);
            outline: none;
        }
        #matrixEnvSelect option {
            background: var(--bg-page);
            color: var(--text-dark);
        }

        .clear-btn {
            border-bottom: 1px solid var(--border-light);
        }

        /* 预览卡片 (源码) */
        .markdown-panel {
            margin-top: 24px;
            background: var(--preview-bg);
            padding: 16px;
            border-radius: 0;
        }
        /* 新增的整体预览卡片 */
        .preview-panel {
            background: var(--preview-bg);
            padding: 16px;
            border-radius: 0;
            margin-top: 8px;
        }
        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .preview-header h3 {
            font-size: 13px;
            font-weight: 500;
            color: var(--pre-header-text);
            letter-spacing: 0.5px;
            margin: 0;
        }
        #matrixPreview {
            background: var(--pre-code-bg);
            padding: 20px;
            overflow-x: auto;
            border: 1px solid var(--pre-code-border);
            color: var(--pre-code-text);
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #matrixPreview .katex { font-size: 1.2rem; }  /* 适度放大 */

        .markdown-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .markdown-header h3 {
            font-size: 13px;
            font-weight: 500;
            color: var(--pre-header-text);
            letter-spacing: 0.5px;
            margin: 0;
        }
        .copy-btn {
            background: transparent;
            border: none;
            color: var(--pre-header-text);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            border-bottom: 1px solid #aaa;
        }
        .copy-btn:hover {
            border-bottom-color: var(--border-focus);
        }

        pre {
            background: var(--pre-code-bg);
            padding: 16px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
            border: 1px solid var(--pre-code-border);
            color: var(--pre-code-text);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .preview-hint {
            font-size: 0.75rem;
            color: rgba(0,0,0,0.45);
            word-break: break-all;
            padding: 0.3rem 0;
            border-top: 0.5px solid rgba(0,0,0,0.05);
            margin-top: 0.5rem;
            font-family: monospace;
        }

        .footer-hint {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: rgba(0,0,0,0.5);
            text-align: center;
            line-height: 1.5;
            font-weight: 300;
        }
        hr {
            border: none;
            border-top: 0.5px solid rgba(0,0,0,0.05);
            margin: 0.8rem 0;
        }

        .copy-feedback {
            color: var(--color-Furina-vintage-gold-light);
            font-size: 0.9rem;
            margin-left: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">
        <h2>矩阵生成器 · LaTeX</h2>
        <div style="font-size:0.9rem; color:#6AC6E8;">单击单元格编辑</div>
    </div>

    <!-- 第一行：行列输入 + 应用按钮 (不再清空内容) -->
    <div class="row">
        <div style="display: flex; gap: 0.5rem; align-items: baseline;">
            <div class="dim-input" style="display: flex; align-items: center; gap: 0.2rem;">
                <label style="font-size:0.9rem;">行数</label>
                <input type="number" id="rowsInput" min="1" max="9" value="2" class="input-field" style="width:70px; flex:none;">
            </div>
            <div class="dim-input" style="display: flex; align-items: center; gap: 0.2rem;">
                <label style="font-size:0.9rem;">列数</label>
                <input type="number" id="colsInput" min="1" max="9" value="2" class="input-field" style="width:70px; flex:none;">
            </div>
        </div>
        <button class="btn" id="applyDim">应用行列</button>
    </div>

    <!-- 网格容器 —— 矩阵单元格 -->
    <div class="grid-container" id="gridContainer"></div>

    <!-- 工具栏：矩阵环境选择 + 清空按钮 -->
    <div class="edge-toolbar" id="matrixToolbar">
        <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
            <span style="font-size:0.95rem; color: var(--text-dark);">矩阵环境:</span>
            <select id="matrixEnvSelect" class="input-field" style="width: auto; min-width: 130px;">
                <option value="matrix">matrix</option>
                <option value="pmatrix" selected>pmatrix</option>
                <option value="bmatrix">bmatrix</option>
                <option value="Bmatrix">Bmatrix</option>
                <option value="vmatrix">vmatrix</option>
                <option value="Vmatrix">Vmatrix</option>
            </select>
        </div>
        <button class="btn clear-btn" id="clearMatrixBtn">清空</button>
    </div>

    <!-- 新增的整体渲染预览卡片 -->
    <div class="preview-panel">
        <div class="preview-header">
            <h3>整体预览</h3>
        </div>
        <div id="matrixPreview">$$ \begin{pmatrix}  &  \\  &  \end{pmatrix} $$</div>
    </div>

    <!-- 源码预览卡片 + 复制按钮 (原有) -->
    <div class="markdown-panel">
        <div class="markdown-header">
            <h3>Markdown / LaTeX 代码</h3>
            <button class="copy-btn" id="copyMarkdownBtn">复制代码</button>
        </div>
        <pre id="markdownOutput">$$\n\\begin{pmatrix}\n & \\\\\n & \n\\end{pmatrix}\n$$</pre>
        <div id="copyFeedback" class="preview-hint" style="text-align:right;"></div>
    </div>

    <hr>
    <div class="footer-hint">
        • 调整行列时，原位置内容会自动保留 (裁切或扩充为空白)<br>
    </div>
</div>

<script>
(function() {
    // --- 等待 KaTeX 加载 ---
    function waitForKatex(callback) {
        if (window.katex) {
            callback();
        } else {
            setTimeout(() => waitForKatex(callback), 50);
        }
    }

    // --- 状态 ---
    let rows = 2;
    let cols = 2;
    let cellContents = [];   // 二维数组: rows × cols

    // DOM 元素
    const rowsInput = document.getElementById('rowsInput');
    const colsInput = document.getElementById('colsInput');
    const applyBtn = document.getElementById('applyDim');
    const gridContainer = document.getElementById('gridContainer');
    const markdownOutput = document.getElementById('markdownOutput');
    const copyBtn = document.getElementById('copyMarkdownBtn');
    const copyFeedback = document.getElementById('copyFeedback');
    const matrixEnvSelect = document.getElementById('matrixEnvSelect');
    const clearMatrixBtn = document.getElementById('clearMatrixBtn');
    const matrixPreviewDiv = document.getElementById('matrixPreview');

    // --- 工具函数：初始化全空矩阵 (指定尺寸) ---
    function createEmptyMatrix(r, c) {
        return Array(r).fill().map(() => Array(c).fill(''));
    }

    // --- 迁移内容：旧内容 -> 新尺寸 (保留对应位置) ---
    function migrateContents(oldContents, newRows, newCols) {
        const newContents = createEmptyMatrix(newRows, newCols);
        for (let i = 0; i < Math.min(oldContents.length, newRows); i++) {
            for (let j = 0; j < Math.min(oldContents[i].length, newCols); j++) {
                newContents[i][j] = oldContents[i][j] || '';  // 保留原有内容
            }
        }
        return newContents;
    }

    // --- 使用 KaTeX 渲染单元格内数学 (与原来一致) ---
    function renderMathInGrid() {
        const tds = gridContainer.querySelectorAll('td.matrix-cell');
        tds.forEach(td => {
            const row = parseInt(td.dataset.row, 10);
            const col = parseInt(td.dataset.col, 10);
            if (isNaN(row) || isNaN(col)) return;
            const content = cellContents[row]?.[col] || '';
            td.innerHTML = '';
            if (content.trim() === '') return;
            try {
                katex.render(content, td, {
                    displayMode: false,
                    throwOnError: false,
                    output: 'html'
                });
            } catch (e) {
                td.textContent = content;
                td.style.color = 'red';
            }
        });
    }

    // --- 渲染整个表格 ---
    function renderGrid() {
        let html = '<table class="swap-table">';
        for (let i = 0; i < rows; i++) {
            html += '<tr>';
            for (let j = 0; j < cols; j++) {
                html += `<td class="matrix-cell" data-row="${i}" data-col="${j}"></td>`;
            }
            html += '</tr>';
        }
        html += '</table>';
        gridContainer.innerHTML = html;

        if (window.katex) {
            renderMathInGrid();
        } else {
            waitForKatex(renderMathInGrid);
        }
    }

    // --- 生成 LaTeX 矩阵代码 (根据选择的环境) ---
    function generateMarkdown() {
        const env = matrixEnvSelect.value;
        const colFormat = 'c'.repeat(cols);
        let body = '';

        for (let i = 0; i < rows; i++) {
            const rowCells = [];
            for (let j = 0; j < cols; j++) {
                let content = cellContents[i]?.[j] || '';
                rowCells.push(content);
            }
            body += rowCells.join(' & ');
            if (i < rows - 1) body += ' \\\\\n';
        }

        return `$$\n\\begin{${env}}\n${body}\n\\end{${env}}\n$$`;
    }

    // --- 更新源码预览 ---
    function updateMarkdown() {
        markdownOutput.innerText = generateMarkdown();
        renderFullMatrix();  // 同时更新整体渲染预览
    }

    // --- 整体渲染预览 (使用KaTeX渲染整个矩阵) ---
    function renderFullMatrix() {
        const env = matrixEnvSelect.value;
        // 构建不带$$的矩阵体，用于katex渲染（显示模式）
        let body = '';
        for (let i = 0; i < rows; i++) {
            const rowCells = [];
            for (let j = 0; j < cols; j++) {
                rowCells.push(cellContents[i]?.[j] || '');
            }
            body += rowCells.join(' & ');
            if (i < rows - 1) body += ' \\\\ ';
        }
        const matrixTex = `\\begin{${env}} ${body} \\end{${env}}`;

        try {
            katex.render(matrixTex, matrixPreviewDiv, {
                displayMode: true,
                throwOnError: false,
                output: 'html'
            });
        } catch (e) {
            matrixPreviewDiv.innerHTML = `<span style="color:red;">渲染错误: ${e.message}</span>`;
        }
    }

    // --- 复制功能 ---
    function copyMarkdown() {
        const text = markdownOutput.innerText;
        navigator.clipboard.writeText(text).then(() => {
            copyFeedback.innerText = '✓ 已复制到剪贴板';
            setTimeout(() => { copyFeedback.innerText = ''; }, 2000);
        }).catch(() => {
            copyFeedback.innerText = '❌ 复制失败';
        });
    }

    // --- 原地编辑 ---
    function startEditing(td, row, col) {
        if (td.querySelector('input')) return;
        const originalContent = cellContents[row]?.[col] || '';
        td.innerHTML = '';

        const input = document.createElement('input');
        input.type = 'text';
        input.value = originalContent;
        input.className = 'cell-editor';
        input.style.width = '100%';
        input.style.height = '100%';
        input.style.boxSizing = 'border-box';

        td.appendChild(input);
        input.focus();

        function finishEdit() {
            const newValue = input.value;
            cellContents[row][col] = newValue;
            renderGrid();
            updateMarkdown();   // 更新源码和整体预览
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                finishEdit();
            } else if (e.key === 'Escape') {
                renderGrid();    // 放弃修改
            }
        });
        input.addEventListener('blur', finishEdit);
    }

    // --- 单击事件：编辑单元格 ---
    function handleGridClick(e) {
        const td = e.target.closest('td');
        if (!td) return;
        const row = parseInt(td.dataset.row, 10);
        const col = parseInt(td.dataset.col, 10);
        if (isNaN(row) || isNaN(col)) return;
        startEditing(td, row, col);
    }

    // --- 维度更新 (智能迁移) ---
    function updateDim() {
        let newRows = parseInt(rowsInput.value, 10);
        let newCols = parseInt(colsInput.value, 10);
        if (isNaN(newRows) || newRows < 1) newRows = 1;
        if (isNaN(newCols) || newCols < 1) newCols = 1;
        newRows = Math.min(9, newRows);
        newCols = Math.min(9, newCols);
        rowsInput.value = newRows;
        colsInput.value = newCols;

        if (newRows !== rows || newCols !== cols) {
            // 迁移内容
            const oldContents = cellContents;
            cellContents = migrateContents(oldContents, newRows, newCols);
            rows = newRows;
            cols = newCols;
            renderGrid();
            updateMarkdown();
        } else {
            // 如果行列没变，但用户仍点击了应用，我们什么也不做（或者可以提示，但不必要）
        }
    }

    // --- 清空矩阵内容 (保留尺寸) ---
    function clearMatrix() {
        cellContents = createEmptyMatrix(rows, cols);
        renderGrid();
        updateMarkdown();
    }

    // --- 环境切换时更新预览 ---
    function handleEnvChange() {
        updateMarkdown();  // 内部调用整体渲染
    }

    // --- 初始化 ---
    function init() {
        // 设置初始内容（空）
        rows = 2; cols = 2;
        cellContents = createEmptyMatrix(rows, cols);

        waitForKatex(() => {
            renderGrid();
            updateMarkdown();  // 首次渲染预览
        });

        // 事件绑定
        gridContainer.addEventListener('click', handleGridClick);

        applyBtn.addEventListener('click', updateDim);
        copyBtn.addEventListener('click', copyMarkdown);
        matrixEnvSelect.addEventListener('change', handleEnvChange);
        clearMatrixBtn.addEventListener('click', clearMatrix);

        rowsInput.addEventListener('change', () => {
            let val = parseInt(rowsInput.value, 10);
            if (isNaN(val) || val < 1) rowsInput.value = 1;
            if (val > 9) rowsInput.value = 9;
        });
        colsInput.addEventListener('change', () => {
            let val = parseInt(colsInput.value, 10);
            if (isNaN(val) || val < 1) colsInput.value = 1;
            if (val > 9) colsInput.value = 9;
        });
    }

    init();
})();
</script>
</body>
</html>
