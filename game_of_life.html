<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>双色生命</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
    margin: 0;
    padding: 0;
    background-color: var(--color-Furina-frost-white);
    font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
    overflow: hidden;
    height: 100dvh;               /* 使用动态视口高度，避免浏览器工具栏影响 */
    width: 100vw;
    display: flex;
    flex-direction: column;
    touch-action: pan-y pinch-zoom;
}

        :root {
            --color-Furina-deep-navy: #253085;
            --color-Furina-royal-blue: #465BCF;
            --color-Furina-aqua-cyan: #6AC6E8;
            --color-Furina-frost-white: #FAFBFC;
            --color-Furina-misty-blue: #C4D7ED;
            --color-Furina-vivid-sapphire: #5670E9;
            --color-Furina-luminous-hydro: #70DBFF;
            --color-Furina-bright-periwinkle: #8DA4F1;
            --color-Furina-vintage-gold: #BD9368;
            --color-Furina-vintage-gold-light: #DDB368;
            --color-Furina-vintage-gold-ultra-light: #FDF388;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: var(--color-Furina-frost-white);
            touch-action: none; /* 禁止默认滚动/缩放，由我们自己处理 */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: var(--color-Furina-frost-white);
            touch-action: none;
        }

        

.controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.5rem 0.8rem;           /* 缩小间隙，适应窄屏 */
    padding: 0.4rem 0.5rem;
    background-color: var(--color-Furina-frost-white);
    border-top: 1px solid var(--color-Furina-misty-blue);
    font-size: 0.9rem;            /* 基础字号稍小，让按钮更容易在一行显示 */
    font-weight: 400;
    color: var(--color-Furina-deep-navy);
    letter-spacing: 0.01em;
    min-height: 52px;             /* 略微降低最小高度，但仍保证可点击 */
    flex-shrink: 0;               /* 防止被压缩 */
    width: 100%;
    box-sizing: border-box;
}

        .ctrl-btn {
            position: relative;
            cursor: pointer;
            color: var(--color-Furina-deep-navy);
            transition: color 0.1s ease;
            white-space: nowrap;
            padding: 0.4rem 0.2rem;
            border: none;
            background: none;
            font-size: inherit;
            font-family: inherit;
            line-height: 1.2;
            min-height: 44px;        /* 移动端最小点击区域 */
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn::after {
            content: '';
            position: absolute;
            bottom: 0px;
            left: 0;
            right: 0;
            height: 1.5px;
            background-color: transparent;
            transition: background-color 0.15s;
        }

        .ctrl-btn:hover {
            color: var(--color-Furina-royal-blue);
        }

        .ctrl-btn:hover::after {
            background-color: var(--color-Furina-aqua-cyan);
        }

        .ctrl-btn.active {
            color: var(--color-Furina-vintage-gold);
        }

        .ctrl-btn.active::after {
            background-color: var(--color-Furina-vintage-gold);
        }

        .generation {
            display: inline-block;
            margin-left: 0.2rem;
            color: var(--color-Furina-vivid-sapphire);
            font-feature-settings: "tnum";
            min-width: 70px;          /* 稳定宽度 */
            text-align: center;
        }

        .generation::after {
            background-color: transparent !important;
        }

        .color-indicator {
            display: inline-block;
            width: 0.8rem;
            height: 0.8rem;
            border-radius: 1px;
            margin-left: 0.2rem;
            background-color: currentColor;
            vertical-align: middle;
        }

        .separator {
            width: 1px;
            height: 1.5rem;
            background-color: var(--color-Furina-misty-blue);
            margin: 0 0.2rem;
        }

        button:focus {
            outline: none;
        }


/* 针对超小高度设备（例如折叠屏展开后的窄条），进一步缩小 */
@media (max-height: 500px) {
    .controls {
        min-height: 44px;
        padding: 0.2rem 0.3rem;
        gap: 0.3rem 0.5rem;
        font-size: 0.8rem;
    }
    .ctrl-btn {
        min-height: 36px;
        min-width: 36px;
    }
}
    </style>
</head>
<body>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="randomBtn">随机</button>
        <button class="ctrl-btn" id="clearBtn">清空</button>
        <button class="ctrl-btn" id="playPauseBtn">▶</button>
        <span class="ctrl-btn generation" id="genCounter">世代 0</span>

        <span class="separator"></span>

        <button class="ctrl-btn" id="colorABtn" data-mode="A">
            <span>蓝</span>
            <span class="color-indicator" style="color: var(--color-Furina-royal-blue);"></span>
        </button>
        <button class="ctrl-btn" id="colorBBtn" data-mode="B">
            <span>金</span>
            <span class="color-indicator" style="color: var(--color-Furina-vintage-gold);"></span>
        </button>
        <button class="ctrl-btn" id="eraseBtn" data-mode="erase">
            <span>擦除</span>
            <span class="color-indicator" style="background-color: transparent; border:1px solid var(--color-Furina-deep-navy);"></span>
        </button>
    </div>

    <script>
        (function() {
            // ----- 颜色 & 常量 -----
            const COLOR_A = 'A';
            const COLOR_B = 'B';

            const COLOR_MAP = {
                [COLOR_A]: '#465BCF',   // Furina-royal-blue
                [COLOR_B]: '#BD9368'    // Furina-vintage-gold
            };

            // ----- 全局变量 -----
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            let cells = new Map();          // "x,y" -> 'A' 或 'B'
            let generation = 0;

            // 视图参数 (初始 cellSize 调小，显示更大范围)
            let viewportX = 0.0;
            let viewportY = 0.0;
            let cellSize = 8;                // 默认更小，显示范围更大
            const MIN_CELL_SIZE = 5;          // 缩放范围稍宽，但不过分
            const MAX_CELL_SIZE = 30;

            let canvasWidth = window.innerWidth;
            let canvasHeight = window.innerHeight - 60; // 大致控制栏高度

            // 交互状态 (鼠标 + 触摸)
            let isPlaying = false;
            let playInterval = null;
            let drawMode = 'A';                // 'A', 'B', 'erase'

            // 鼠标/触摸绘制
            let isDrawing = false;              // 鼠标左键/单指触摸绘制中
            let lastGridX = null, lastGridY = null;

            // 右键拖拽平移 (鼠标)
            let isDragging = false;
            let dragStartX = 0, dragStartY = 0;
            let viewportStartX = 0, viewportStartY = 0;

            // 触摸双指操作
            let touchActive = false;
            let pinchStartDist = 0;
            let pinchStartCellSize = cellSize;
            let pinchCenterScreenX = 0, pinchCenterScreenY = 0;
            let pinchCenterWorldX = 0, pinchCenterWorldY = 0;
            let isPinching = false;

            // 按钮元素
            const randomBtn = document.getElementById('randomBtn');
            const clearBtn = document.getElementById('clearBtn');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const genSpan = document.getElementById('genCounter');
            const colorABtn = document.getElementById('colorABtn');
            const colorBBtn = document.getElementById('colorBBtn');
            const eraseBtn = document.getElementById('eraseBtn');
            const modeBtns = [colorABtn, colorBBtn, eraseBtn];

            // ----- 辅助函数 -----
            function screenToGrid(screenX, screenY) {
                const worldX = viewportX + screenX / cellSize;
                const worldY = viewportY + screenY / cellSize;
                return { x: Math.floor(worldX), y: Math.floor(worldY) };
            }

            function gridToScreenRect(gridX, gridY) {
                const left = (gridX - viewportX) * cellSize;
                const top = (gridY - viewportY) * cellSize;
                return { left, top, width: cellSize, height: cellSize };
            }

            // 绘制网格和细胞
            function drawGrid() {
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);

                const startCol = Math.floor(viewportX);
                const endCol = Math.ceil(viewportX + canvasWidth / cellSize);
                const startRow = Math.floor(viewportY);
                const endRow = Math.ceil(viewportY + canvasHeight / cellSize);

                // 网格线
                ctx.strokeStyle = '#C4D7ED';
                ctx.lineWidth = 0.5;
                for (let i = startCol; i <= endCol; i++) {
                    const x = (i - viewportX) * cellSize;
                    if (x < 0 || x > canvasWidth) continue;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvasHeight);
                    ctx.stroke();
                }
                for (let i = startRow; i <= endRow; i++) {
                    const y = (i - viewportY) * cellSize;
                    if (y < 0 || y > canvasHeight) continue;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvasWidth, y);
                    ctx.stroke();
                }

                // 活细胞
                cells.forEach((color, key) => {
                    const [xStr, yStr] = key.split(',');
                    const x = parseInt(xStr, 10);
                    const y = parseInt(yStr, 10);
                    if (x < startCol - 1 || x > endCol + 1 || y < startRow - 1 || y > endRow + 1) return;
                    const { left, top, width, height } = gridToScreenRect(x, y);
                    ctx.fillStyle = COLOR_MAP[color] || '#465BCF';
                    ctx.fillRect(left, top, width - 0.5, height - 0.5);
                });
            }

            function updateGenerationDisplay() {
                genSpan.textContent = `世代 ${generation}`;
            }

            // ----- 演化规则 (不变) -----
            function nextGeneration() {
                const neighborCount = new Map();

                cells.forEach((color, key) => {
                    const [xStr, yStr] = key.split(',');
                    const x = parseInt(xStr, 10);
                    const y = parseInt(yStr, 10);

                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = x + dx;
                            const ny = y + dy;
                            const nKey = `${nx},${ny}`;
                            if (!neighborCount.has(nKey)) {
                                neighborCount.set(nKey, { total: 0, a: 0, b: 0 });
                            }
                            const record = neighborCount.get(nKey);
                            record.total += 1;
                            if (color === COLOR_A) record.a += 1;
                            else record.b += 1;
                        }
                    }
                });

                const nextCells = new Map();

                neighborCount.forEach((count, key) => {
                    const [xStr, yStr] = key.split(',');
                    const x = parseInt(xStr, 10);
                    const y = parseInt(yStr, 10);
                    const currentColor = cells.get(key);

                    if (currentColor) {
                        if (count.total === 2 || count.total === 3) {
                            nextCells.set(key, currentColor);
                        }
                    } else {
                        if (count.total === 3) {
                            const newColor = count.a > count.b ? COLOR_A : COLOR_B;
                            nextCells.set(key, newColor);
                        }
                    }
                });

                cells = nextCells;
                generation++;
                updateGenerationDisplay();
                drawGrid();
            }

            function togglePlay() {
                isPlaying = !isPlaying;
                if (isPlaying) {
                    playPauseBtn.textContent = '⏸';
                    playInterval = setInterval(() => { nextGeneration(); }, 150);
                } else {
                    playPauseBtn.textContent = '▶';
                    clearInterval(playInterval);
                    playInterval = null;
                }
            }

            function pause() {
                if (isPlaying) togglePlay();
            }

            // ----- 随机 / 清空 -----
            function randomize() {
                pause();
                cells.clear();
                const range = 80;
                const count = 10000;
                for (let i = 0; i < count; i++) {
                    const x = Math.floor(Math.random() * (range * 2)) - range;
                    const y = Math.floor(Math.random() * (range * 2)) - range;
                    const color = Math.random() < 0.5 ? COLOR_A : COLOR_B;
                    cells.set(`${x},${y}`, color);
                }
                generation = 0;
                updateGenerationDisplay();
                drawGrid();
            }

            function clearAll() {
                pause();
                cells.clear();
                generation = 0;
                updateGenerationDisplay();
                drawGrid();
            }

            // ----- 绘制操作 -----
            function applyDrawAt(gridX, gridY) {
                const key = `${gridX},${gridY}`;
                if (drawMode === 'erase') {
                    return cells.delete(key);
                } else {
                    if (cells.get(key) !== drawMode) {
                        cells.set(key, drawMode);
                        return true;
                    }
                }
                return false;
            }

            // ----- 调整画布大小 -----
            function resizeCanvas() {
                const wrapper = document.querySelector('.canvas-wrapper');
                const rect = wrapper.getBoundingClientRect();
                canvasWidth = rect.width;
                canvasHeight = rect.height;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                drawGrid();
            }
            window.addEventListener('resize', resizeCanvas);

            // ----- 鼠标事件 (保持不变，但为了与触摸共存，保留) -----
            function initMouseEvents() {
                canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    const worldX = viewportX + mouseX / cellSize;
                    const worldY = viewportY + mouseY / cellSize;

                    let delta = e.deltaY > 0 ? -1.5 : 1.5;
                    let newSize = cellSize + delta;
                    newSize = Math.min(MAX_CELL_SIZE, Math.max(MIN_CELL_SIZE, newSize));
                    if (newSize === cellSize) return;
                    cellSize = newSize;

                    viewportX = worldX - mouseX / cellSize;
                    viewportY = worldY - mouseY / cellSize;

                    drawGrid();
                }, { passive: false });

                canvas.addEventListener('mousedown', (e) => {
                    if (e.button === 2) {
                        e.preventDefault();
                        isDragging = true;
                        dragStartX = e.clientX;
                        dragStartY = e.clientY;
                        viewportStartX = viewportX;
                        viewportStartY = viewportY;
                        canvas.style.cursor = 'grabbing';
                    } else if (e.button === 0) {
                        isDrawing = true;
                        const rect = canvas.getBoundingClientRect();
                        const mouseX = e.clientX - rect.left;
                        const mouseY = e.clientY - rect.top;
                        const { x, y } = screenToGrid(mouseX, mouseY);
                        applyDrawAt(x, y);
                        lastGridX = x;
                        lastGridY = y;
                        drawGrid();
                    }
                });

                canvas.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        e.preventDefault();
                        const dx = e.clientX - dragStartX;
                        const dy = e.clientY - dragStartY;
                        viewportX = viewportStartX - dx / cellSize;
                        viewportY = viewportStartY - dy / cellSize;
                        drawGrid();
                    } else if (isDrawing) {
                        const rect = canvas.getBoundingClientRect();
                        const mouseX = e.clientX - rect.left;
                        const mouseY = e.clientY - rect.top;
                        const { x, y } = screenToGrid(mouseX, mouseY);
                        if (x !== lastGridX || y !== lastGridY) {
                            applyDrawAt(x, y);
                            drawGrid();
                            lastGridX = x;
                            lastGridY = y;
                        }
                    }
                });

                canvas.addEventListener('mouseup', (e) => {
                    if (e.button === 2) {
                        isDragging = false;
                        canvas.style.cursor = 'crosshair';
                    } else if (e.button === 0) {
                        isDrawing = false;
                        lastGridX = null; lastGridY = null;
                    }
                });

                canvas.addEventListener('mouseleave', () => {
                    isDragging = false;
                    isDrawing = false;
                    canvas.style.cursor = 'crosshair';
                });

                canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            }

            // ----- 触摸事件 (移动端) -----
            function initTouchEvents() {
                let touchStartDistance = 0;
                let touchStartCellSize = cellSize;
                let touchStartViewportX = viewportX;
                let touchStartViewportY = viewportY;
                let touchStartCenter = { x: 0, y: 0 }; // 屏幕坐标中心
                let isMultiTouch = false;

                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // 阻止滚动
                    const touches = e.touches;
                    if (touches.length === 1) {
                        // 单指绘制
                        isDrawing = true;
                        isMultiTouch = false;
                        const rect = canvas.getBoundingClientRect();
                        const touchX = touches[0].clientX - rect.left;
                        const touchY = touches[0].clientY - rect.top;
                        const { x, y } = screenToGrid(touchX, touchY);
                        applyDrawAt(x, y);
                        lastGridX = x;
                        lastGridY = y;
                        drawGrid();
                    } else if (touches.length === 2) {
                        // 双指开始：进入平移/缩放模式，停止绘制
                        isDrawing = false;
                        isMultiTouch = true;
                        lastGridX = lastGridY = null;

                        // 记录两指中点屏幕坐标
                        const rect = canvas.getBoundingClientRect();
                        const x1 = touches[0].clientX - rect.left;
                        const y1 = touches[0].clientY - rect.top;
                        const x2 = touches[1].clientX - rect.left;
                        const y2 = touches[1].clientY - rect.top;
                        const centerX = (x1 + x2) / 2;
                        const centerY = (y1 + y2) / 2;
                        touchStartCenter = { x: centerX, y: centerY };

                        // 记录当前世界坐标中心点
                        pinchCenterWorldX = viewportX + centerX / cellSize;
                        pinchCenterWorldY = viewportY + centerY / cellSize;

                        // 记录初始距离
                        const dx = x2 - x1;
                        const dy = y2 - y1;
                        touchStartDistance = Math.hypot(dx, dy);
                        touchStartCellSize = cellSize;
                        touchStartViewportX = viewportX;
                        touchStartViewportY = viewportY;
                    }
                }, { passive: false });

                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touches = e.touches;
                    if (isDrawing && touches.length === 1) {
                        // 单指移动绘制
                        const rect = canvas.getBoundingClientRect();
                        const touchX = touches[0].clientX - rect.left;
                        const touchY = touches[0].clientY - rect.top;
                        const { x, y } = screenToGrid(touchX, touchY);
                        if (x !== lastGridX || y !== lastGridY) {
                            applyDrawAt(x, y);
                            drawGrid();
                            lastGridX = x;
                            lastGridY = y;
                        }
                    } else if (isMultiTouch && touches.length === 2) {
                        // 双指平移缩放
                        const rect = canvas.getBoundingClientRect();
                        const x1 = touches[0].clientX - rect.left;
                        const y1 = touches[0].clientY - rect.top;
                        const x2 = touches[1].clientX - rect.left;
                        const y2 = touches[1].clientY - rect.top;

                        // 当前中心点
                        const centerX = (x1 + x2) / 2;
                        const centerY = (y1 + y2) / 2;

                        // 当前距离
                        const dx = x2 - x1;
                        const dy = y2 - y1;
                        const currentDist = Math.hypot(dx, dy);

                        if (touchStartDistance > 0) {
                            // 缩放因子
                            const scale = currentDist / touchStartDistance;
                            let newCellSize = touchStartCellSize * scale;
                            newCellSize = Math.min(MAX_CELL_SIZE, Math.max(MIN_CELL_SIZE, newCellSize));
                            if (newCellSize !== cellSize) {
                                cellSize = newCellSize;
                                // 重新计算视口，使得中心点世界坐标不变
                                viewportX = pinchCenterWorldX - centerX / cellSize;
                                viewportY = pinchCenterWorldY - centerY / cellSize;
                            } else {
                                // 仅平移 (基于初始视口 + 偏移)
                                const deltaX = (centerX - touchStartCenter.x) / cellSize;
                                const deltaY = (centerY - touchStartCenter.y) / cellSize;
                                viewportX = touchStartViewportX - deltaX;
                                viewportY = touchStartViewportY - deltaY;
                            }
                        }
                        drawGrid();
                    }
                }, { passive: false });

                canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    const touches = e.touches;
                    if (touches.length === 0) {
                        // 所有手指抬起
                        isDrawing = false;
                        isMultiTouch = false;
                        lastGridX = lastGridY = null;
                    } else if (touches.length === 1) {
                        // 从双指变为单指: 停止多指模式，进入绘制模式（可选），但为避免误触，我们退出绘制
                        isMultiTouch = false;
                        isDrawing = false; // 需要重新按下才开始绘制
                        lastGridX = lastGridY = null;
                    }
                });

                canvas.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    isDrawing = false;
                    isMultiTouch = false;
                    lastGridX = lastGridY = null;
                });
            }

            // ----- 按钮事件 -----
            function initUI() {
                randomBtn.addEventListener('click', randomize);
                clearBtn.addEventListener('click', clearAll);
                playPauseBtn.addEventListener('click', togglePlay);

                function setActiveMode(mode) {
                    drawMode = mode;
                    modeBtns.forEach(btn => btn.classList.remove('active'));
                    if (mode === 'A') colorABtn.classList.add('active');
                    else if (mode === 'B') colorBBtn.classList.add('active');
                    else if (mode === 'erase') eraseBtn.classList.add('active');
                }

                colorABtn.addEventListener('click', () => setActiveMode('A'));
                colorBBtn.addEventListener('click', () => setActiveMode('B'));
                eraseBtn.addEventListener('click', () => setActiveMode('erase'));

                setActiveMode('A');
            }

            // ----- 初始化视图 (中心原点，cellSize较小) -----
            function initialView() {
                randomize();  // 生成随机细胞
                // 将视口中心设置为 (0,0)，考虑到 cellSize 较小，能看到较大范围
                viewportX = - (canvasWidth / cellSize) / 2;
                viewportY = - (canvasHeight / cellSize) / 2;
                drawGrid();
            }

            function init() {
                resizeCanvas();
                initMouseEvents();
                initTouchEvents();
                initUI();
                initialView();
            }

            init();

            // 辅助调试 (可选)
            window._cells = cells;
        })();
    </script>
</body>
</html>
