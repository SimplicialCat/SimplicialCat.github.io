<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命游戏</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-Furina-frost-white);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* 芙宁娜色调变量 */
        :root {
            --color-Furina-deep-navy: #253085;
            --color-Furina-royal-blue: #465BCF;
            --color-Furina-aqua-cyan: #6AC6E8;
            --color-Furina-frost-white: #FAFBFC;
            --color-Furina-misty-blue: #C4D7ED;
            --color-Furina-vivid-sapphire: #5670E9;
            --color-Furina-luminous-hydro: #70DBFF;
            --color-Furina-bright-periwinkle: #8DA4F1;
            --color-Furina-vintage-gold: #BD9368;
            --color-Furina-vintage-gold-light: #DDB368;
            --color-Furina-vintage-gold-ultra-light: #FDF388;
        }

        /* 画布占据主要空间 */
        .canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: var(--color-Furina-frost-white);
            cursor: crosshair;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: var(--color-Furina-frost-white);
        }

        /* 底部控制栏 — 极简，仅文字+下划线 */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: center;
            gap: 1.8rem 1.2rem;
            padding: 0.75rem 1.5rem 0.5rem;
            background-color: var(--color-Furina-frost-white);
            border-top: 1px solid var(--color-Furina-misty-blue);
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--color-Furina-deep-navy);
            letter-spacing: 0.01em;
        }

        /* 按钮基座：只有文字 + 下方细线 */
        .ctrl-btn {
            position: relative;
            cursor: pointer;
            color: var(--color-Furina-deep-navy);
            transition: color 0.1s ease;
            white-space: nowrap;
            padding: 0.2rem 0;
            border: none;
            background: none;
            font-size: inherit;
            font-family: inherit;
            line-height: 1.2;
        }

        /* 下方细横线 (默认透明，hover/active显现) */
        .ctrl-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 1.5px;
            background-color: transparent;
            transition: background-color 0.15s;
        }

        .ctrl-btn:hover {
            color: var(--color-Furina-royal-blue);
        }

        .ctrl-btn:hover::after {
            background-color: var(--color-Furina-aqua-cyan);
        }

        /* 选中状态：金色下划线 + 可能金色文字 */
        .ctrl-btn.active {
            color: var(--color-Furina-vintage-gold);
        }

        .ctrl-btn.active::after {
            background-color: var(--color-Furina-vintage-gold);
        }

        /* 世代计数单独样式 — 也是纯文字+细线，但不带交互 */
        .generation {
            display: inline-block;
            margin-left: 0.5rem;
            color: var(--color-Furina-vivid-sapphire);
            font-feature-settings: "tnum";
        }

        .generation::after {
            background-color: transparent !important; /* 不显示下划线 */
        }

        /* 颜色小标记 (纯粹为了视觉对应) */
        .color-indicator {
            display: inline-block;
            width: 0.7rem;
            height: 0.7rem;
            border-radius: 1px;
            margin-left: 0.2rem;
            background-color: currentColor;
            vertical-align: middle;
        }

        /* 分割线风格 */
        .separator {
            width: 1px;
            height: 1.2rem;
            background-color: var(--color-Furina-misty-blue);
            margin: 0 0.2rem;
        }

        /* 移除所有阴影、内容块 */
        button:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <!-- 随机 -->
        <button class="ctrl-btn" id="randomBtn">随机</button>
        <!-- 清空 -->
        <button class="ctrl-btn" id="clearBtn">清空</button>
        <!-- 播放/暂停 共用按钮 -->
        <button class="ctrl-btn" id="playPauseBtn">▶</button>
        <!-- 世代计数 -->
        <span class="ctrl-btn generation" id="genCounter">世代 0</span>

        <!-- 分隔符 (纯粹装饰) -->
        <span class="separator"></span>

        <!-- 绘制面板: 玩家1 (蓝) 玩家2 (金) 擦除 -->
        <button class="ctrl-btn" id="colorABtn" data-mode="A">
            <span>颜色</span>
            <span class="color-indicator" style="color: var(--color-Furina-royal-blue);"></span>
        </button>
        <button class="ctrl-btn" id="colorBBtn" data-mode="B">
            <span>颜色</span>
            <span class="color-indicator" style="color: var(--color-Furina-vintage-gold);"></span>
        </button>
        <button class="ctrl-btn" id="eraseBtn" data-mode="erase">
            <span>擦除</span>
            <span class="color-indicator" style="background-color: transparent; border:1px solid var(--color-Furina-deep-navy);"></span>
        </button>
    </div>

    <script>
        (function() {
            // ----- 颜色 & 常量 -----
            const COLOR_A = 'A';       // 蓝色玩家
            const COLOR_B = 'B';       // 金色玩家

            // 芙宁娜色调映射到颜色值
            const COLOR_MAP = {
                [COLOR_A]: '#465BCF',   // Furina-royal-blue
                [COLOR_B]: '#BD9368'    // Furina-vintage-gold
            };

            // ----- 全局变量 -----
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // 网格数据: 键 "x,y" -> 颜色字符 'A' 或 'B'
            let cells = new Map();

            let generation = 0;

            // 视图参数
            let viewportX = 0.0;          // 视口左上角世界 X (格子坐标)
            let viewportY = 0.0;           // 视口左上角世界 Y
            let cellSize = 20;              // 格子像素大小 (会随滚轮变化)
            const MIN_CELL_SIZE = 6;         // 不要缩放得太小
            const MAX_CELL_SIZE = 36;        // 不要放得太大

            // 画布尺寸 (物理像素)
            let canvasWidth = window.innerWidth;
            let canvasHeight = window.innerHeight - 60; // 减去控制栏高度粗略值，动态调整

            // 交互状态
            let isPlaying = false;
            let playInterval = null;
            let drawMode = 'A';              // 'A', 'B', 'erase'
            let isDragging = false;           // 右键拖拽平移
            let isDrawing = false;             // 左键绘制中
            let lastGridX = null, lastGridY = null; // 用于避免同一格重复绘制
            let dragStartX = 0, dragStartY = 0;
            let viewportStartX = 0, viewportStartY = 0;

            // 按钮元素
            const randomBtn = document.getElementById('randomBtn');
            const clearBtn = document.getElementById('clearBtn');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const genSpan = document.getElementById('genCounter');
            const colorABtn = document.getElementById('colorABtn');
            const colorBBtn = document.getElementById('colorBBtn');
            const eraseBtn = document.getElementById('eraseBtn');

            // 所有模式按钮用于激活样式
            const modeBtns = [colorABtn, colorBBtn, eraseBtn];

            // ----- 初始化画布尺寸 (响应式) -----
            function resizeCanvas() {
                const wrapper = document.querySelector('.canvas-wrapper');
                const rect = wrapper.getBoundingClientRect();
                canvasWidth = rect.width;
                canvasHeight = rect.height;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                drawGrid();
            }
            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            // ----- 辅助函数: 坐标转换 -----
            function screenToGrid(screenX, screenY) {
                const worldX = viewportX + screenX / cellSize;
                const worldY = viewportY + screenY / cellSize;
                const gridX = Math.floor(worldX);
                const gridY = Math.floor(worldY);
                return { x: gridX, y: gridY };
            }

            // 从网格坐标获得屏幕矩形 (用于绘制)
            function gridToScreenRect(gridX, gridY) {
                const left = (gridX - viewportX) * cellSize;
                const top = (gridY - viewportY) * cellSize;
                return { left, top, width: cellSize, height: cellSize };
            }

            // ----- 绘制网格和活细胞 -----
            function drawGrid() {
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);

                // 计算可见格子范围 (向外扩展1格防止边缘空缺)
                const startCol = Math.floor(viewportX);
                const endCol = Math.ceil(viewportX + canvasWidth / cellSize);
                const startRow = Math.floor(viewportY);
                const endRow = Math.ceil(viewportY + canvasHeight / cellSize);

                // 绘制网格线 (极浅细线)
                ctx.strokeStyle = '#C4D7ED'; // misty-blue
                ctx.lineWidth = 0.5;
                for (let i = startCol; i <= endCol; i++) {
                    const x = (i - viewportX) * cellSize;
                    if (x < 0 || x > canvasWidth) continue;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvasHeight);
                    ctx.strokeStyle = '#C4D7ED';
                    ctx.stroke();
                }
                for (let i = startRow; i <= endRow; i++) {
                    const y = (i - viewportY) * cellSize;
                    if (y < 0 || y > canvasHeight) continue;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvasWidth, y);
                    ctx.strokeStyle = '#C4D7ED';
                    ctx.stroke();
                }

                // 绘制活细胞
                cells.forEach((color, key) => {
                    const [xStr, yStr] = key.split(',');
                    const x = parseInt(xStr, 10);
                    const y = parseInt(yStr, 10);
                    if (x < startCol - 1 || x > endCol + 1 || y < startRow - 1 || y > endRow + 1) return; // 视口外不绘制

                    const { left, top, width, height } = gridToScreenRect(x, y);
                    ctx.fillStyle = COLOR_MAP[color] || '#465BCF'; // fallback
                    ctx.fillRect(left, top, width - 0.5, height - 0.5); // 留一点缝隙看见网格
                });
            }

            // ----- 更新世代显示 -----
            function updateGenerationDisplay() {
                genSpan.textContent = `世代 ${generation}`;
            }

            // ----- 演化一代 (双色规则) -----
            function nextGeneration() {
                const neighborCount = new Map(); // key -> { total, a, b }

                // 遍历所有活细胞，为邻居增加计数
                cells.forEach((color, key) => {
                    const [xStr, yStr] = key.split(',');
                    const x = parseInt(xStr, 10);
                    const y = parseInt(yStr, 10);

                    // 八个方向
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = x + dx;
                            const ny = y + dy;
                            const nKey = `${nx},${ny}`;
                            if (!neighborCount.has(nKey)) {
                                neighborCount.set(nKey, { total: 0, a: 0, b: 0 });
                            }
                            const record = neighborCount.get(nKey);
                            record.total += 1;
                            if (color === COLOR_A) record.a += 1;
                            else record.b += 1;
                        }
                    }
                });

                const nextCells = new Map();

                // 处理所有有邻居计数的格子 (可能诞生或存活)
                neighborCount.forEach((count, key) => {
                    const [xStr, yStr] = key.split(',');
                    const x = parseInt(xStr, 10);
                    const y = parseInt(yStr, 10);
                    const currentColor = cells.get(key); // undefined 如果死亡

                    if (currentColor) {
                        // 存活细胞规则：邻居为2或3则存活，否则死
                        if (count.total === 2 || count.total === 3) {
                            nextCells.set(key, currentColor); // 颜色不变
                        }
                    } else {
                        // 死亡细胞诞生：恰好3个活邻居
                        if (count.total === 3) {
                            // 多数颜色 (count.total=3 且 a+b=3, 必有 majority)
                            const newColor = count.a > count.b ? COLOR_A : COLOR_B;
                            nextCells.set(key, newColor);
                        }
                    }
                });

                // 此外: 当前活细胞但没有任何邻居计数(即孤立, total=0) -> 死亡, 已不在neighborCount中, 无需处理
                // 但还要检查一些活细胞可能在neighborCount中但因为规则死亡, 已经没加入nextCells, 正确。

                // 更新 cells 和世代
                cells = nextCells;
                generation++;
                updateGenerationDisplay();
                drawGrid();
            }

            // 定时演化
            function togglePlay() {
                isPlaying = !isPlaying;
                if (isPlaying) {
                    playPauseBtn.textContent = '⏸️';
                    playInterval = setInterval(() => {
                        nextGeneration();
                    }, 150); // 适中速度
                } else {
                    playPauseBtn.textContent = '▶';
                    clearInterval(playInterval);
                    playInterval = null;
                }
            }

            // 停止播放 (清空、随机时)
            function pause() {
                if (isPlaying) {
                    togglePlay();
                }
            }

            // ----- 随机生成 (有限范围) -----
            function randomize() {
                pause();
                cells.clear();
                const range = 40; // -40 .. 40 区间
                const count = 2400; // 不太密
                for (let i = 0; i < count; i++) {
                    const x = Math.floor(Math.random() * (range * 2)) - range;
                    const y = Math.floor(Math.random() * (range * 2)) - range;
                    const color = Math.random() < 0.5 ? COLOR_A : COLOR_B;
                    cells.set(`${x},${y}`, color);
                }
                generation = 0;
                updateGenerationDisplay();
                drawGrid();
            }

            // 清空
            function clearAll() {
                pause();
                cells.clear();
                generation = 0;
                updateGenerationDisplay();
                drawGrid();
            }

            // ----- 绘制/擦除操作 (根据drawMode) -----
            function applyDrawAt(gridX, gridY) {
                const key = `${gridX},${gridY}`;
                if (drawMode === 'erase') {
                    if (cells.delete(key)) {
                        return true;
                    }
                } else {
                    // 绘制颜色 A 或 B
                    const current = cells.get(key);
                    if (current !== drawMode) {
                        cells.set(key, drawMode);
                        return true;
                    }
                }
                return false;
            }

            // ----- 事件绑定 -----
            function initEvents() {
                // 鼠标滚轮缩放 (基于鼠标位置)
                canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    // 鼠标所在世界坐标 (保持不变)
                    const worldX = viewportX + mouseX / cellSize;
                    const worldY = viewportY + mouseY / cellSize;

                    // 调整cellSize
                    const delta = e.deltaY > 0 ? -1.5 : 1.5; // 平滑
                    let newSize = cellSize + delta;
                    newSize = Math.min(MAX_CELL_SIZE, Math.max(MIN_CELL_SIZE, newSize));
                    if (newSize === cellSize) return;
                    cellSize = newSize;

                    // 重新计算视口，使鼠标下方世界坐标不变
                    viewportX = worldX - mouseX / cellSize;
                    viewportY = worldY - mouseY / cellSize;

                    drawGrid();
                }, { passive: false });

                // 右键拖拽平移 (阻止默认菜单)
                canvas.addEventListener('mousedown', (e) => {
                    if (e.button === 2) {
                        e.preventDefault();
                        isDragging = true;
                        dragStartX = e.clientX;
                        dragStartY = e.clientY;
                        viewportStartX = viewportX;
                        viewportStartY = viewportY;
                        canvas.style.cursor = 'grabbing';
                    } else if (e.button === 0) {
                        // 左键绘制
                        isDrawing = true;
                        const rect = canvas.getBoundingClientRect();
                        const mouseX = e.clientX - rect.left;
                        const mouseY = e.clientY - rect.top;
                        const { x: gridX, y: gridY } = screenToGrid(mouseX, mouseY);
                        applyDrawAt(gridX, gridY);
                        lastGridX = gridX;
                        lastGridY = gridY;
                        drawGrid();
                    }
                });

                canvas.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        e.preventDefault();
                        const dx = e.clientX - dragStartX;
                        const dy = e.clientY - dragStartY;
                        viewportX = viewportStartX - dx / cellSize;
                        viewportY = viewportStartY - dy / cellSize;
                        drawGrid();
                    } else if (isDrawing) {
                        const rect = canvas.getBoundingClientRect();
                        const mouseX = e.clientX - rect.left;
                        const mouseY = e.clientY - rect.top;
                        const { x: gridX, y: gridY } = screenToGrid(mouseX, mouseY);
                        // 避免同一格反复重绘
                        if (gridX !== lastGridX || gridY !== lastGridY) {
                            if (applyDrawAt(gridX, gridY)) {
                                drawGrid();
                            }
                            lastGridX = gridX;
                            lastGridY = gridY;
                        }
                    }
                });

                canvas.addEventListener('mouseup', (e) => {
                    if (e.button === 2) {
                        isDragging = false;
                        canvas.style.cursor = 'crosshair';
                    } else if (e.button === 0) {
                        isDrawing = false;
                        lastGridX = null; lastGridY = null;
                    }
                });

                canvas.addEventListener('mouseleave', () => {
                    isDragging = false;
                    isDrawing = false;
                    canvas.style.cursor = 'crosshair';
                });

                // 禁止右键菜单
                canvas.addEventListener('contextmenu', (e) => e.preventDefault());

                // 按钮事件
                randomBtn.addEventListener('click', randomize);
                clearBtn.addEventListener('click', clearAll);
                playPauseBtn.addEventListener('click', togglePlay);

                // 模式切换: 激活样式
                function setActiveMode(mode) {
                    drawMode = mode;
                    modeBtns.forEach(btn => btn.classList.remove('active'));
                    if (mode === 'A') colorABtn.classList.add('active');
                    else if (mode === 'B') colorBBtn.classList.add('active');
                    else if (mode === 'erase') eraseBtn.classList.add('active');
                }

                colorABtn.addEventListener('click', () => setActiveMode('A'));
                colorBBtn.addEventListener('click', () => setActiveMode('B'));
                eraseBtn.addEventListener('click', () => setActiveMode('erase'));

                // 默认激活A
                setActiveMode('A');
            }

            // 额外：重置视角到原点附近（可选，但随机后可能视野丢失，用户可平移）
            // 我们可以在随机后保持当前视图不变，但若空白可以重置
            // 增加一个微调：第一次打开随机一组并居中
            function initialRandomAndCenter() {
                randomize(); // 包含cells填充，generation=0
                // 将视口中心设为 (0,0)
                viewportX = - (canvasWidth / cellSize) / 2;
                viewportY = - (canvasHeight / cellSize) / 2;
                drawGrid();
            }

            // 启动一切
            function init() {
                resizeCanvas();
                initEvents();
                initialRandomAndCenter(); // 给用户初始图案
            }

            init();

            // 暴露给窗口便于调试 (可选)
            window._cells = cells;
        })();
    </script>
</body>
</html>
