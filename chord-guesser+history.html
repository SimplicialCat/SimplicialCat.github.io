<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜和弦</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f7fc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 1rem;
        }

        :root {
            --color-deep-navy: #253085;
            --color-royal-blue: #465BCF;
            --color-frost-white: #FAFBFC;
            --color-misty-blue: #C4D7ED;
            --color-vintage-gold: #BD9368;
            --color-vintage-gold-light: #DDB368;
            --color-vintage-gold-ultra-light: #FDF388;
            --history-bg: rgba(69, 91, 207, 0.04);
            --history-border: rgba(37, 48, 133, 0.12);
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            padding: 1.5rem 1rem 1.8rem;
        }

        .button-panel {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        #randomBtn {
            margin-right: auto;
        }

        .action-btn {
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 400;
            padding: 0.5rem 0.2rem 0.3rem;
            cursor: pointer;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 80px;
            color: var(--color-deep-navy);
            border-bottom: 2px solid transparent;
            transition: border-color 0.1s, color 0.1s;
        }

        .action-btn:nth-child(1) { border-bottom-color: var(--color-vintage-gold); }
        .action-btn:nth-child(2) { border-bottom-color: var(--color-vintage-gold-light); }
        .action-btn:nth-child(3) { border-bottom-color: var(--color-royal-blue); }
        .action-btn:nth-child(4) { border-bottom-color: var(--color-deep-navy); }

        .action-btn:hover {
            color: var(--color-royal-blue);
            border-bottom-width: 3px;
        }

        .piano-container {
            background: none;
            padding: 0.8rem 0.2rem 0.5rem;
            margin-bottom: 1rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .piano-keys {
            position: relative;
            height: 160px;
            min-width: 680px;
            margin: 0 auto;
        }

        .piano-key {
            position: absolute;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 6px;
            font-size: 0.7rem;
            font-weight: 450;
            user-select: none;
            transition: background 0.05s, transform 0.05s;
            box-sizing: border-box;
        }

        .piano-key:active {
            transform: scaleY(0.96);
        }

        .white {
            background: var(--color-frost-white);
            height: 160px;
            width: 6.6667%;
            bottom: 0;
            color: var(--color-deep-navy);
            border-right: 1px solid rgba(37, 48, 133, 0.12);
        }
        .white:last-child {
            border-right: none;
        }

        .black {
            background: var(--color-deep-navy);
            height: 96px;
            width: 4%;
            top: 0;
            color: var(--color-frost-white);
            z-index: 10;
            font-size: 0.6rem;
            padding-bottom: 5px;
            align-items: flex-end;
        }

        .piano-key.selected {
            background: var(--color-vintage-gold-light) !important;
            color: var(--color-deep-navy) !important;
        }

        .success-message {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 450;
            color: var(--color-vintage-gold);
            background: rgba(253, 243, 136, 0.15);
            padding: 0.3rem 0.8rem;
            margin: 0.5rem 0 1rem;
            transition: opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }

        .success-message.show {
            opacity: 1;
        }

        .history-section {
            margin-top: 1.5rem;
            border-top: 1px solid var(--history-border);
            padding-top: 1rem;
        }

        .history-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 0.6rem;
        }

        .history-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--color-royal-blue);
        }

        .history-clear-btn {
            background: none;
            border: none;
            font-size: 0.7rem;
            color: var(--color-misty-blue);
            cursor: pointer;
            border-bottom: 1px dashed var(--color-misty-blue);
            padding: 0 0.2rem;
        }

        .history-clear-btn:hover {
            color: var(--color-vintage-gold);
            border-bottom-color: var(--color-vintage-gold);
        }

        .history-strip {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
        }

        .history-chord-block {
            background: var(--history-bg);
            border: 1px solid var(--history-border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: 470;
            color: var(--color-deep-navy);
            cursor: pointer;
            transition: all 0.1s ease;
            white-space: nowrap;
            font-family: monospace;
        }

        .history-chord-block:hover {
            background: rgba(221, 179, 104, 0.15);
            border-color: var(--color-vintage-gold-light);
        }

        .history-chord-block.active-history {
            background: var(--color-vintage-gold-ultra-light);
            border-color: var(--color-vintage-gold);
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="button-panel">
        <button class="action-btn" id="randomBtn">生成目标</button>
        <button class="action-btn" id="replayTargetBtn">播放目标</button>
        <button class="action-btn" id="userPlayBtn">播放所选</button>
        <button class="action-btn" id="clearBtn">清空所选</button>
    </div>

    <div class="piano-container">
        <div class="piano-keys" id="pianoKeys"></div>
    </div>

    <div class="success-message" id="successMsg">正确</div>

    <div class="history-section">
        <div class="history-header">
            <span class="history-title">历史记录</span>
            <button class="history-clear-btn" id="clearHistoryBtn">清空</button>
        </div>
        <div class="history-strip" id="historyStrip">
            <div style="color: #c4d7ed80; font-size:0.7rem;">点击生成目标</div>
        </div>
    </div>
</div>

<script>
    (function() {
        let audioCtx = null;
        let activeOscillators = new Set();
        let targetChord = [];

        const pianoKeys = document.getElementById('pianoKeys');
        const randomBtn = document.getElementById('randomBtn');
        const replayTargetBtn = document.getElementById('replayTargetBtn');
        const userBtn = document.getElementById('userPlayBtn');
        const clearBtn = document.getElementById('clearBtn');
        const successMsg = document.getElementById('successMsg');
        const historyStrip = document.getElementById('historyStrip');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        let historyChords = [];

        const pitchClasses = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        function getAllNotes() {
            const notes = [];
            for (let midi = 60; midi <= 84; midi++) {
                const octave = Math.floor(midi / 12) - 1;
                const pc = pitchClasses[midi % 12];
                notes.push(pc + octave);
            }
            return notes;
        }
        const allNotes = getAllNotes();
        const whiteNotes = allNotes.filter(n => !n.includes('#'));
        const blackNotes = allNotes.filter(n => n.includes('#'));

        function getLeftWhiteIndex(blackNote) {
            const noteName = blackNote.slice(0, -1);
            const octave = blackNote.slice(-1);
            let leftNote;
            if (noteName === 'C#') leftNote = 'C' + octave;
            else if (noteName === 'D#') leftNote = 'D' + octave;
            else if (noteName === 'F#') leftNote = 'F' + octave;
            else if (noteName === 'G#') leftNote = 'G' + octave;
            else if (noteName === 'A#') leftNote = 'A' + octave;
            else return -1;
            return whiteNotes.indexOf(leftNote);
        }

        function renderPiano() {
            pianoKeys.innerHTML = '';
            const whiteWidthPercent = 100 / 15;
            const blackWidthPercent = 4;

            whiteNotes.forEach((note, index) => {
                const key = document.createElement('div');
                key.className = 'piano-key white';
                key.dataset.note = note;
                key.textContent = note;
                key.style.left = index * whiteWidthPercent + '%';
                key.style.width = whiteWidthPercent + '%';
                pianoKeys.appendChild(key);
            });

            blackNotes.forEach(note => {
                const leftIdx = getLeftWhiteIndex(note);
                if (leftIdx === -1) return;
                const boundary = (leftIdx + 1) * whiteWidthPercent;
                const leftPercent = Math.max(0, Math.min(100 - blackWidthPercent, boundary - blackWidthPercent * 0.5));
                const key = document.createElement('div');
                key.className = 'piano-key black';
                key.dataset.note = note;
                key.textContent = note;
                key.style.left = leftPercent + '%';
                key.style.width = blackWidthPercent + '%';
                pianoKeys.appendChild(key);
            });
        }

        function getSelectedNotes() {
            const selectedKeys = document.querySelectorAll('.piano-key.selected');
            return Array.from(selectedKeys).map(k => k.dataset.note);
        }

        function clearAllSelections() {
            document.querySelectorAll('.piano-key.selected').forEach(k => k.classList.remove('selected'));
        }

        function noteNameToMidi(note) {
            const match = note.match(/^([A-G]#?)(\d+)$/);
            if (!match) return null;
            const [, name, octaveStr] = match;
            const octave = parseInt(octaveStr, 10);
            const semitone = pitchClasses.indexOf(name);
            if (semitone === -1) return null;
            return 12 * (octave + 1) + semitone;
        }

        function stopAllSounds() {
            activeOscillators.forEach(osc => {
                try { osc.stop(); osc.disconnect(); } catch(e) {}
            });
            activeOscillators.clear();
        }

        async function playChord(noteNames) {
            if (!noteNames || noteNames.length === 0) return;
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            stopAllSounds();

            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.28;
            masterGain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            const duration = 1.3;

            noteNames.forEach(note => {
                const midi = noteNameToMidi(note);
                if (midi === null || midi < 60 || midi > 84) return;
                let gainFactor = 2 - (midi - 60) / 24;
                gainFactor = Math.min(1.8, Math.max(0.9, gainFactor));
                const freq = 440 * Math.pow(2, (midi - 69) / 12);
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.2 * gainFactor, now + 0.02);
                gainNode.gain.linearRampToValueAtTime(0.14 * gainFactor, now + duration - 0.15);
                gainNode.gain.linearRampToValueAtTime(0, now + duration);
                osc.connect(gainNode);
                gainNode.connect(masterGain);
                osc.start(now);
                osc.stop(now + duration);
                activeOscillators.add(osc);
                osc.onended = () => {
                    activeOscillators.delete(osc);
                    try { gainNode.disconnect(); } catch(e) {}
                };
            });
        }

        async function playNote(noteName) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            const midi = noteNameToMidi(noteName);
            if (midi === null || midi < 60 || midi > 84) return;
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            const now = audioCtx.currentTime;
            const duration = 0.6;
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = freq;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.1, now + 0.01);
            gainNode.gain.linearRampToValueAtTime(0.08, now + duration - 0.1);
            gainNode.gain.linearRampToValueAtTime(0, now + duration);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + duration);
            activeOscillators.add(osc);
            osc.onended = () => {
                activeOscillators.delete(osc);
                try { gainNode.disconnect(); } catch(e) {}
            };
        }

        function generateRandomChord() {
            const maxAttempts = 200;
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const numNotes = Math.random() < 0.6 ? 3 : 4;
                const startMidi = Math.floor(Math.random() * 14) + 60;
                const chordMidi = [startMidi];
                let valid = true;
                for (let i = 1; i < numNotes; i++) {
                    const prev = chordMidi[i-1];
                    const step = Math.floor(Math.random() * 4) + 2;
                    const next = prev + step;
                    if (next > 84) {
                        if (prev + 2 <= 84) {
                            chordMidi.push(prev + 2);
                        } else {
                            valid = false;
                            break;
                        }
                    } else {
                        chordMidi.push(next);
                    }
                }
                if (valid && chordMidi.length === numNotes) {
                    return chordMidi.map(midi => {
                        const octave = Math.floor(midi / 12) - 1;
                        const pc = pitchClasses[midi % 12];
                        return pc + octave;
                    });
                }
            }
            return ['C4', 'E4', 'G4'];
        }

        function updateSuccessState() {
            const selected = getSelectedNotes();
            const sortedSelected = [...selected].sort();
            const sortedTarget = [...targetChord].sort();
            const isMatch = sortedSelected.length === sortedTarget.length && 
                            sortedSelected.every((v, i) => v === sortedTarget[i]);
            if (isMatch) successMsg.classList.add('show');
            else successMsg.classList.remove('show');
        }

        function setNewTarget(newChordNotes) {
            if (!newChordNotes || newChordNotes.length === 0) return;
            targetChord = [...newChordNotes];
            clearAllSelections();
            updateSuccessState();
            playChord(targetChord);
            highlightActiveHistoryBlock();
        }

        function addCurrentToHistory() {
            if (!targetChord.length) return;
            historyChords.push([...targetChord]);
            renderHistoryStrip();
        }

        function renderHistoryStrip() {
            historyStrip.innerHTML = '';
            if (historyChords.length === 0) {
                const emptyHint = document.createElement('div');
                emptyHint.textContent = '暂无历史';
                emptyHint.style.color = '#C4D7ED';
                emptyHint.style.fontSize = '0.7rem';
                emptyHint.style.padding = '6px 10px';
                historyStrip.appendChild(emptyHint);
                return;
            }

            historyChords.forEach((chordArray, idx) => {
                const chordBlock = document.createElement('div');
                chordBlock.className = 'history-chord-block';
                // 只显示序号，不显示和弦内容
                chordBlock.textContent = '#' + (idx + 1);
                chordBlock.title = '点击设为当前目标';
                chordBlock.setAttribute('data-history-index', idx);
                chordBlock.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const selectedChord = historyChords[idx];
                    if (selectedChord) {
                        setNewTarget(selectedChord);
                    }
                });
                historyStrip.appendChild(chordBlock);
            });
            highlightActiveHistoryBlock();
        }

        function highlightActiveHistoryBlock() {
            const blocks = document.querySelectorAll('.history-chord-block');
            blocks.forEach(block => block.classList.remove('active-history'));
            if (!targetChord.length) return;
            const targetSorted = [...targetChord].sort();
            for (let i = 0; i < historyChords.length; i++) {
                const histSorted = [...historyChords[i]].sort();
                if (histSorted.length === targetSorted.length && histSorted.every((v, idx) => v === targetSorted[idx])) {
                    const blockToHighlight = document.querySelector(`.history-chord-block[data-history-index="${i}"]`);
                    if (blockToHighlight) blockToHighlight.classList.add('active-history');
                    break;
                }
            }
        }

        function clearHistory() {
            if (historyChords.length === 0) return;
            historyChords = [];
            renderHistoryStrip();
        }

        function startNewRound() {
            const newChord = generateRandomChord();
            historyChords.push([...newChord]);
            renderHistoryStrip();
            setNewTarget(newChord);
        }

        function initGame() {
            renderPiano();
            const initialChord = generateRandomChord();
            targetChord = [...initialChord];
            historyChords = [[...initialChord]];
            renderHistoryStrip();
            clearAllSelections();
            updateSuccessState();
            playChord(targetChord);
        }

        pianoKeys.addEventListener('click', async (e) => {
            const key = e.target.closest('.piano-key');
            if (!key) return;
            key.classList.toggle('selected');
            updateSuccessState();
            await playNote(key.dataset.note);
        });

        randomBtn.addEventListener('click', () => {
            startNewRound();
        });

        replayTargetBtn.addEventListener('click', () => {
            if (targetChord.length === 0) {
                targetChord = generateRandomChord();
            }
            playChord(targetChord);
        });

        userBtn.addEventListener('click', async () => {
            const selected = getSelectedNotes();
            if (selected.length === 0) return;
            await playChord(selected);
            updateSuccessState();
        });

        clearBtn.addEventListener('click', () => {
            clearAllSelections();
            updateSuccessState();
        });

        clearHistoryBtn.addEventListener('click', () => {
            clearHistory();
        });

        window.addEventListener('beforeunload', () => {
            if (audioCtx) audioCtx.close();
        });

        initGame();
    })();
</script>
</body>
</html>
